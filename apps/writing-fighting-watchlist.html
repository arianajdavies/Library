<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Writing Fighting Watchlist</title>
  <meta name="description" content="A channel-wide Writing Fighting tracker with watched and need-to-watch filters." />
  <style>
    :root {
      --ink: #182329;
      --muted: #60717c;
      --bg: #f6f2ea;
      --paper: #fffdf8;
      --soft: #ece4d6;
      --line: #d8cebd;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --warn: #a35f00;
      --shadow: 0 16px 42px rgba(34, 29, 22, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.45;
    }

    a {
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(246, 242, 234, 0.9);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .back {
      color: var(--muted);
      font-weight: 800;
      text-decoration: none;
    }

    .playlist-link {
      color: var(--accent-dark);
      font-weight: 800;
      text-decoration: none;
    }

    .hero {
      padding: 42px 0 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 34px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.9rem);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .lead {
      margin: 18px 0 0;
      max-width: 720px;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 10px;
      box-shadow: var(--shadow);
    }

    .stat {
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--line);
    }

    .stat strong {
      display: block;
      font-size: 1.55rem;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .toolbar {
      margin: 18px 0 22px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }

    .filter-stack {
      display: grid;
      gap: 8px;
    }

    .filters {
      display: inline-grid;
      grid-template-columns: repeat(3, minmax(104px, 1fr));
      gap: 6px;
      padding: 6px;
      background: var(--soft);
      border: 1px solid var(--line);
    }

    button {
      font: inherit;
    }

    .filter,
    .action,
    .notes-toggle,
    .expand-notes {
      min-height: 42px;
      border: 1px solid transparent;
      padding: 0 14px;
      background: transparent;
      color: var(--ink);
      font-weight: 850;
      cursor: pointer;
    }

    .filter[aria-pressed="true"] {
      background: var(--paper);
      border-color: var(--line);
      box-shadow: 0 6px 16px rgba(34, 29, 22, 0.08);
    }

    .expand-notes,
    .notes-toggle {
      width: fit-content;
      background: var(--paper);
      border-color: var(--line);
      color: var(--accent-dark);
    }

    .notes-toggle {
      min-height: 36px;
      margin-top: 12px;
      padding: 0 12px;
    }

    .search {
      min-height: 44px;
      width: min(320px, 100%);
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      padding: 0 12px;
      font: inherit;
    }

    .list {
      display: grid;
      gap: 12px;
      padding-bottom: 48px;
    }

    .video {
      display: grid;
      grid-template-columns: 178px minmax(0, 1fr) auto;
      gap: 16px;
      align-items: start;
      padding: 12px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(34, 29, 22, 0.07);
    }

    .thumb {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--soft);
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .number {
      position: absolute;
      left: 8px;
      top: 8px;
      min-width: 42px;
      min-height: 28px;
      display: grid;
      place-items: center;
      background: rgba(24, 35, 41, 0.88);
      color: #fff;
      font-weight: 900;
      font-size: 0.86rem;
    }

    .meta h2 {
      margin: 0 0 8px;
      font-size: clamp(1rem, 2vw, 1.24rem);
      line-height: 1.22;
    }

    .meta a {
      color: var(--accent-dark);
      font-weight: 800;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .video.watched {
      opacity: 0.74;
    }

    .video.watched .status {
      color: var(--accent-dark);
    }

    .action {
      min-width: 150px;
      align-self: start;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent-dark);
    }

    .action.secondary {
      background: var(--paper);
      color: var(--warn);
      border-color: var(--line);
    }

    .notes {
      grid-column: 1 / -1;
      margin-top: 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 12px;
      align-items: start;
    }

    .notes[hidden] {
      display: none;
    }

    .notes label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 850;
    }

    .notes textarea {
      min-height: 112px;
      width: 100%;
      resize: vertical;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--ink);
      padding: 10px 12px;
      font: inherit;
      line-height: 1.4;
    }

    .image-note {
      display: grid;
      gap: 8px;
    }

    .image-note input {
      width: 100%;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
    }

    .image-note input::file-selector-button {
      min-height: 34px;
      margin-right: 8px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--accent-dark);
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }

    .note-preview {
      min-height: 106px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px dashed var(--line);
      background: var(--bg);
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
      text-align: center;
    }

    .note-preview img {
      width: 100%;
      height: 100%;
      max-height: 150px;
      object-fit: cover;
    }

    .clear-image {
      min-height: 36px;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--warn);
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }

    .empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
      background: var(--paper);
      border: 1px solid var(--line);
    }

    @media (max-width: 860px) {
      .hero,
      .video {
        grid-template-columns: 1fr;
      }

      .notes {
        grid-template-columns: 1fr;
      }

      .stats {
        max-width: 420px;
      }

      .toolbar {
        align-items: stretch;
      }

      .filter-stack,
      .filters,
      .expand-notes,
      .search,
      .action {
        width: 100%;
      }
    }

    @media (max-width: 520px) {
      nav {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 0;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    const watched = new Set(JSON.parse(localStorage.getItem(storageKey) || "[]"));

    const noteImages = JSON.parse(localStorage.getItem(imagesKey) || "{}");

    const expandedNotes = new Set();
    const collapsedNotes = new Set();
    let activeFilter = "all";
    let allNotesExpanded = false;

    const videos = playlist.sort((a, b) => {
      const aNumber = titleNumber(a.title);
      const bNumber = titleNumber(b.title);
      if (aNumber !== bNumber) return aNumber - bNumber;
      return a.originalIndex - b.originalIndex;
    });

    function titleNumber(title) {
      const match = title.match(/\bWriting Fighting\s+(\d+)\b/i);
      return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
    }

    function saveWatched() {
      localStorage.setItem(storageKey, JSON.stringify([...watched]));
    }

    function saveNotes() {
      localStorage.setItem(notesKey, JSON.stringify(notes));
    }

    function saveNoteImages() {
      localStorage.setItem(imagesKey, JSON.stringify(noteImages));
    }

      document.querySelector("#totalCount").textContent = videos.length;
      document.querySelector("#watchedCount").textContent = watched.size;
      document.querySelector("#needCount").textContent = videos.length - watched.size;
      expandAllNotesButton.textContent = allNotesExpanded ? "Collapse all notes" : "Expand all notes";
      expandAllNotesButton.setAttribute("aria-pressed", String(allNotesExpanded));
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      const visible = videos.filter((video) => {
        const isWatched = watched.has(video.id);
        const matchesFilter =
          activeFilter === "all" ||
          (activeFilter === "need" && !isWatched) ||
          (activeFilter === "watched" && isWatched);
        return matchesFilter && video.title.toLowerCase().includes(query);
      });

        list.innerHTML = '<div class="empty">No videos match this view.</div>';
        return;

        const noteImage = noteImages[video.id] || "";
        const notesAreExpanded = allNotesExpanded ? !collapsedNotes.has(video.id) : expandedNotes.has(video.id);
        const notesPanelId = `notes-${video.id}`;
        const preview = noteImage
          ? `<img src="${noteImage}" alt="Uploaded note reference for ${escapeHtml(video.title)}">`
          : "No note image";
        return `
          <article class="video ${isWatched ? "watched" : ""}">
            <a class="thumb" href="${url}" target="_blank" rel="noreferrer" aria-label="Open ${escapeHtml(video.title)} on YouTube">
              <img src="https://i.ytimg.com/vi/${video.id}/hqdefault.jpg" alt="" loading="lazy">
              <span class="number">${numberLabel}</span>
            </a>
            <div class="meta">
              <h2><a href="${url}" target="_blank" rel="noreferrer">${escapeHtml(video.title)}</a></h2>
              <div class="status">${isWatched ? "Watched" : "Need to Watch"}</div>
              <button class="notes-toggle" type="button" data-toggle-notes-id="${video.id}" aria-expanded="${notesAreExpanded}" aria-controls="${notesPanelId}">
                Notes
              </button>
            </div>
            <button class="action ${isWatched ? "secondary" : ""}" type="button" data-watch-id="${video.id}">
              ${isWatched ? "Unmark watched" : "Mark watched"}
            </button>
            <div class="notes" id="${notesPanelId}" ${notesAreExpanded ? "" : "hidden"}>
              <label>
                Notes
                <textarea data-note-id="${video.id}" placeholder="Write notes for this video">${escapeHtml(note)}</textarea>
              </label>
              <div class="image-note">
                <label>
                  Note picture
                  <input type="file" accept="image/*" data-image-id="${video.id}">
                </label>
                <div class="note-preview" data-preview-id="${video.id}">${preview}</div>
                ${noteImage ? `<button class="clear-image" type="button" data-clear-image-id="${video.id}">Remove picture</button>` : ""}
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (character) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[character]));
    }

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        filterButtons.forEach((item) => item.setAttribute("aria-pressed", String(item === button)));
        render();
      });
    });

    search.addEventListener("input", render);

    expandAllNotesButton.addEventListener("click", () => {
      allNotesExpanded = !allNotesExpanded;
      collapsedNotes.clear();
      if (!allNotesExpanded) {
        expandedNotes.clear();
      }
      render();
    });

    list.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-watch-id]");
      const notesToggleButton = event.target.closest("button[data-toggle-notes-id]");
      const clearImageButton = event.target.closest("button[data-clear-image-id]");

      if (notesToggleButton) {
        const id = notesToggleButton.dataset.toggleNotesId;
        if (allNotesExpanded) {
          if (collapsedNotes.has(id)) {
            collapsedNotes.delete(id);
          } else {
            collapsedNotes.add(id);
          }
        } else if (expandedNotes.has(id)) {
          expandedNotes.delete(id);
        } else {
          expandedNotes.add(id);
        }
        render();
        return;
      }

      if (clearImageButton) {
        delete noteImages[clearImageButton.dataset.clearImageId];
        saveNoteImages();
        render();
        return;
      }

      if (!button) return;

      if (watched.has(button.dataset.watchId)) {
        watched.delete(button.dataset.watchId);
      } else {
        watched.add(button.dataset.watchId);
      }

      saveWatched();
      render();
    });

    list.addEventListener("input", (event) => {
      const textarea = event.target.closest("textarea[data-note-id]");
      if (!textarea) return;

      const id = textarea.dataset.noteId;
      if (textarea.value.trim()) {
        notes[id] = textarea.value;
      } else {
        delete notes[id];
      }
      saveNotes();
    });

    list.addEventListener("change", (event) => {
      const input = event.target.closest("input[data-image-id]");
      if (!input || !input.files.length) return;

      const file = input.files[0];
      if (!file.type.startsWith("image/")) return;

      const reader = new FileReader();
      reader.addEventListener("load", () => {
        noteImages[input.dataset.imageId] = reader.result;
        saveNoteImages();
        render();
      });
      reader.readAsDataURL(file);
    });

    render();
  </script>
</body>
</html>
