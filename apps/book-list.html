<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book List</title>
  <meta name="description" content="A browseable fantasy and romance book tracker with plot, setting, tropes, series, romance, and magic notes." />
  <style>
    :root {
      --ink: #1b2226;
      --muted: #60717c;
      --bg: #f5f1e9;
      --paper: #fffdf8;
      --panel: #ebe3d5;
      --line: #d8cebd;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --berry: #8a3d62;
      --gold: #b2762f;
      --shadow: 0 16px 42px rgba(34, 29, 22, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.45;
    }

    a {
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1320px, calc(100% - 28px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(245, 241, 233, 0.92);
      backdrop-filter: blur(12px);
    }

    nav {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .back {
      color: var(--muted);
      font-weight: 800;
      text-decoration: none;
    }

    .hero {
      padding: 38px 0 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 28px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 7vw, 6rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .lead {
      max-width: 780px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.16rem);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat {
      min-height: 92px;
      padding: 14px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(34, 29, 22, 0.08);
    }

    .stat strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
      color: var(--accent-dark);
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.88rem;
    }

    .toolbar {
      padding: 18px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .control-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(3, minmax(150px, 200px));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      min-height: 36px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 0 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .chip[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent-dark);
      color: #fff;
    }

    .content {
      padding: 24px 0 64px;
    }

    .sheet-wrap {
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      overflow: auto;
      max-height: calc(100vh - 190px);
    }

    .book-sheet {
      min-width: 1600px;
      display: grid;
      grid-template-columns: 250px 280px 260px 270px 280px 240px 300px 240px;
    }

    .sheet-cell {
      min-height: 124px;
      padding: 13px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: #fffdf8;
    }

    .sheet-head {
      position: sticky;
      top: 0;
      z-index: 4;
      min-height: 46px;
      padding: 12px 13px;
      background: var(--accent-dark);
      color: #fff;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.78rem;
    }

    .sheet-book {
      position: sticky;
      left: 0;
      z-index: 2;
      background: #fdf7ec;
    }

    .sheet-head.sheet-book {
      z-index: 5;
      background: #1f3635;
    }

    .book-strip {
      display: grid;
      grid-template-columns: 76px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .cover-wrap {
      position: relative;
      width: 76px;
      aspect-ratio: 5 / 7;
      background: linear-gradient(140deg, #27343a, #8a3d62 52%, #b2762f);
      overflow: hidden;
      border: 1px solid rgba(216, 206, 189, 0.9);
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .book-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.15;
    }

    .author {
      margin: 6px 0 0;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.86rem;
    }

    .chip:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.35);
      outline-offset: 2px;
    }

    .fallback-cover {
      height: 100%;
      display: grid;
      align-content: center;
      gap: 14px;
      padding: 22px;
      color: #fff;
      text-align: center;
    }

    .fallback-cover strong {
      font-size: 0.78rem;
      line-height: 1.08;
    }

    .fallback-cover span {
      opacity: 0.8;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.58rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 8px;
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(216, 206, 189, 0.9);
      color: var(--ink);
      font-weight: 900;
      font-size: 0.74rem;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 7px;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .quick {
      margin: 0;
      color: var(--ink);
      font-size: 0.94rem;
    }

    .section {
      display: grid;
      gap: 8px;
    }

    .section h3 {
      margin: 0;
      font-size: 0.78rem;
      color: var(--accent-dark);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .section p {
      margin: 0;
      color: var(--ink);
      font-size: 0.92rem;
    }

    .source-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .source-list a {
      color: var(--accent-dark);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .note {
      margin-top: 12px;
      padding: 12px;
      border-left: 4px solid var(--gold);
      background: #fbf2df;
      color: #5c3b08;
      font-weight: 700;
    }

    .empty-state {
      display: none;
      padding: 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 800;
    }

    @media (max-width: 980px) {
      .hero,
      .control-row {
        grid-template-columns: 1fr;
      }

      .sheet-wrap {
        max-height: none;
      }
    }

    @media (max-width: 560px) {
      .stats {
        grid-template-columns: 1fr;
      }

      .hero {
        padding-top: 28px;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav class="shell" aria-label="Main navigation">
      <a class="back" href="../index.html">Back to Library</a>
      <strong>Book List</strong>
    </nav>
  </header>

  <main class="shell">
    <section class="hero" aria-labelledby="page-title">
      <div>
        <h1 id="page-title">Book List</h1>
        <p class="lead">Browse the books by plot, setting, magic, romance, tropes, and series status so the next read is easier to pick.</p>
      </div>
      <div class="stats" aria-label="Book list summary">
        <div class="stat">
          <strong id="totalBooks">0</strong>
          <span>books tracked</span>
        </div>
        <div class="stat">
          <strong id="visibleBooks">0</strong>
          <span>currently shown</span>
        </div>
      </div>
    </section>

    <section class="toolbar" aria-label="Book filters">
      <div class="control-row">
        <label>
          Search
          <input id="searchInput" type="search" placeholder="Title, author, trope, setting..." />
        </label>
        <label>
          Romance
          <select id="romanceFilter">
            <option value="">Any romance level</option>
            <option value="none">None or minimal</option>
            <option value="subplot">Subplot</option>
            <option value="central">Central</option>
            <option value="explicit">Explicit/open door</option>
          </select>
        </label>
        <label>
          Series
          <select id="seriesFilter">
            <option value="">Any series status</option>
            <option value="standalone">Standalone</option>
            <option value="ongoing">Ongoing series</option>
            <option value="complete">Complete series</option>
            <option value="uncertain">Needs confirmation</option>
          </select>
        </label>
        <label>
          Sort
          <select id="sortSelect">
            <option value="list">List order</option>
            <option value="title">Title</option>
            <option value="author">Author</option>
            <option value="series">Series status</option>
          </select>
        </label>
      </div>
      <div class="chips" id="chips" aria-label="Browse by category"></div>
    </section>

    <section class="content" aria-label="Book spreadsheet">
      <div class="sheet-wrap">
        <div class="book-sheet" id="bookGrid"></div>
      </div>
      <div class="empty-state" id="emptyState">No books match those filters.</div>
    </section>
  </main>

    const chipData = [
      "romantasy",
      "epic fantasy",
      "political fantasy",
      "YA",
      "gothic",
      "found family",
      "enemies to lovers",
      "standalone",
      "complete",
      "ongoing",
      "needs confirmation"
    ];

    const state = {
      query: "",
      romance: "",
      series: "",
      sort: "list",
      chip: ""
    };

    const grid = document.querySelector("#bookGrid");
    const emptyState = document.querySelector("#emptyState");
    const totalBooks = document.querySelector("#totalBooks");
    const visibleBooks = document.querySelector("#visibleBooks");
    const chips = document.querySelector("#chips");

    totalBooks.textContent = books.length;

    function coverFallback(book) {
      return `<div class="fallback-cover"><strong>${book.title}</strong><span>${book.author}</span></div>`;
    }

    function searchText(book) {
      return [
        book.title,
        book.author,
        book.plot,
        book.setting,
        book.magic,
        book.romance,
        book.series,
        book.seriesStatus,
        ...book.tropes
      ].join(" ").toLowerCase();
    }

    function matchesChip(book) {
      if (!state.chip) return true;
      if (state.chip === "YA") return searchText(book).includes(" ya ") || searchText(book).includes("young adult");
      if (["standalone", "complete", "ongoing"].includes(state.chip)) return book.seriesStatus === state.chip;
      if (state.chip === "needs confirmation") return book.seriesStatus === "uncertain" || searchText(book).includes("needs confirmation");
      return searchText(book).includes(state.chip.toLowerCase());
    }

    function filteredBooks() {
      const query = state.query.trim().toLowerCase();
      let list = books
        .map((book, index) => ({ ...book, index }))
        .filter((book) => !query || searchText(book).includes(query))
        .filter((book) => !state.romance || book.romanceLevel === state.romance)
        .filter((book) => !state.series || book.seriesStatus === state.series)
        .filter(matchesChip);

      if (state.sort === "title") list.sort((a, b) => a.title.localeCompare(b.title));
      if (state.sort === "author") list.sort((a, b) => a.author.localeCompare(b.author));
      if (state.sort === "series") list.sort((a, b) => a.seriesStatus.localeCompare(b.seriesStatus) || a.title.localeCompare(b.title));
      return list;
    }

    function setManualCover(book, img, urlIndex = 0) {
      const urls = book.coverUrls || [];
      if (!urls[urlIndex]) return false;
      img.onerror = () => {
        if (!setManualCover(book, img, urlIndex + 1)) {
          img.onerror = null;
          findCover(book, img, true);
        }
      };
      img.src = urls[urlIndex];
      img.alt = `${book.title} cover`;
      return true;
    }

    async function findCover(book, img, skipManual = false) {
      if (!skipManual && setManualCover(book, img)) return;
      const params = new URLSearchParams({ q: book.coverQuery || `${book.title} ${book.author}`, limit: "1" });
      try {
        const response = await fetch(`https://openlibrary.org/search.json?${params.toString()}`);
        if (!response.ok) throw new Error("Cover lookup failed");
        const data = await response.json();
        const coverId = data.docs && data.docs[0] && data.docs[0].cover_i;
        if (!coverId) throw new Error("No cover");
        img.src = `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`;
        img.alt = `${book.title} cover`;
      } catch {
        const wrap = img.closest(".cover-wrap");
        if (wrap) wrap.innerHTML = coverFallback(book);
      }
    }

    function renderCards() {
      const list = filteredBooks();
      visibleBooks.textContent = list.length;
      emptyState.style.display = list.length ? "none" : "block";
      grid.innerHTML = `
        ${["Book", "Plot", "Setting", "Magic System", "Romance", "Tropes", "Series", "Sources"].map((heading, index) => `
          <div class="sheet-cell sheet-head ${index === 0 ? "sheet-book" : ""}">${heading}</div>
        `).join("")}
        ${list.map((book) => `
          <div class="sheet-cell sheet-book">
            <div class="book-strip">
              <div class="cover-wrap"><img data-cover="${book.index}" alt="" /></div>
              <div>
                <h2 class="book-title">${book.title}</h2>
                <p class="author">${book.author}</p>
              </div>
            </div>
          </div>
          ${sheetCell(book.plot)}
          ${sheetCell(book.setting)}
          ${sheetCell(book.magic)}
          ${sheetCell(book.romance)}
          <div class="sheet-cell"><div class="meta-row">${book.tropes.map((trope) => `<span class="tag">${trope}</span>`).join("")}</div></div>
          ${sheetCell(book.series)}
          <div class="sheet-cell">
            <div class="source-list">
              ${book.sources.map((source) => `<a href="${source.url}" target="_blank" rel="noreferrer">${source.label}</a>`).join("")}
              <a href="https://openlibrary.org/search?q=${encodeURIComponent(book.coverQuery || book.title)}" target="_blank" rel="noreferrer">Cover lookup</a>
            </div>
          </div>
        `).join("")}
      `;

      grid.querySelectorAll("img[data-cover]").forEach((img) => {
        findCover(books[Number(img.dataset.cover)], img);
      });
    }

    function sheetCell(text) {
      return `<div class="sheet-cell"><p class="quick">${text}</p></div>`;
    }

    function renderChips() {
      chips.innerHTML = chipData.map((chip) => `
        <button class="chip" type="button" aria-pressed="${state.chip === chip}" data-chip="${chip}">${chip}</button>
      `).join("");
      chips.querySelectorAll(".chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          state.chip = state.chip === chip.dataset.chip ? "" : chip.dataset.chip;
          renderChips();
          renderCards();
        });
      });
    }

    document.querySelector("#searchInput").addEventListener("input", (event) => {
      state.query = event.target.value;
      renderCards();
    });

    document.querySelector("#romanceFilter").addEventListener("change", (event) => {
      state.romance = event.target.value;
      renderCards();
    });

    document.querySelector("#seriesFilter").addEventListener("change", (event) => {
      state.series = event.target.value;
      renderCards();
    });

    document.querySelector("#sortSelect").addEventListener("change", (event) => {
      state.sort = event.target.value;
      renderCards();
    });

    renderChips();
    renderCards();
  </script>
