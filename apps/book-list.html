<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book List</title>
  <meta name="description" content="A browseable fantasy and romance book tracker with plot, setting, tropes, series, romance, and magic notes." />
  <style>
    :root {
      --ink: #1b2226;
      --muted: #60717c;
      --bg: #f5f1e9;
      --paper: #fffdf8;
      --panel: #ebe3d5;
      --line: #d8cebd;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --berry: #8a3d62;
      --gold: #b2762f;
      --shadow: 0 16px 42px rgba(34, 29, 22, 0.11);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.45;
    }

    a {
      color: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .shell {
      width: min(1320px, calc(100% - 28px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(245, 241, 233, 0.92);
      backdrop-filter: blur(12px);
    }

    nav {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .back {
      color: var(--muted);
      font-weight: 800;
      text-decoration: none;
    }

    .hero {
      padding: 38px 0 22px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 28px;
      align-items: end;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 7vw, 6rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .lead {
      max-width: 780px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.16rem);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat {
      min-height: 92px;
      padding: 14px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(34, 29, 22, 0.08);
    }

    .stat strong {
      display: block;
      font-size: 2rem;
      line-height: 1;
      color: var(--accent-dark);
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.88rem;
    }

    .toolbar {
      padding: 18px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .control-row {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(3, minmax(150px, 200px));
      gap: 12px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-weight: 800;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      min-height: 36px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      padding: 0 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .chip[aria-pressed="true"] {
      background: var(--accent);
      border-color: var(--accent-dark);
      color: #fff;
    }

    .content {
      padding: 24px 0 64px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 24px;
      align-items: start;
    }

    .books {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .book-card {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(34, 29, 22, 0.08);
      overflow: hidden;
      cursor: pointer;
      text-align: left;
      padding: 0;
    }

    .book-card:focus-visible,
    .chip:focus-visible {
      outline: 3px solid rgba(15, 118, 110, 0.35);
      outline-offset: 2px;
    }

    .cover-wrap {
      position: relative;
      aspect-ratio: 5 / 7;
      background: linear-gradient(140deg, #27343a, #8a3d62 52%, #b2762f);
      overflow: hidden;
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .fallback-cover {
      height: 100%;
      display: grid;
      align-content: center;
      gap: 14px;
      padding: 22px;
      color: #fff;
      text-align: center;
    }

    .fallback-cover strong {
      font-size: 1.55rem;
      line-height: 1.08;
    }

    .fallback-cover span {
      opacity: 0.8;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.78rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 8px;
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(216, 206, 189, 0.9);
      color: var(--ink);
      font-weight: 900;
      font-size: 0.74rem;
    }

    .book-card .badge {
      position: absolute;
      left: 10px;
      bottom: 10px;
    }

    .book-body {
      padding: 15px;
      display: grid;
      gap: 10px;
    }

    .book-body h2 {
      margin: 0;
      font-size: 1.22rem;
      line-height: 1.12;
    }

    .author {
      margin: 0;
      color: var(--muted);
      font-weight: 800;
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 7px;
      border: 1px solid var(--line);
      background: var(--bg);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .quick {
      margin: 0;
      color: var(--ink);
      font-size: 0.94rem;
    }

    .detail {
      position: sticky;
      top: 84px;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      max-height: calc(100vh - 104px);
      overflow: auto;
    }

    .detail-empty {
      padding: 22px;
      color: var(--muted);
      font-weight: 700;
    }

    .detail-cover {
      aspect-ratio: 5 / 7;
      background: linear-gradient(140deg, #27343a, #8a3d62 52%, #b2762f);
    }

    .detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .detail-body {
      padding: 18px;
    }

    .detail-body h2 {
      margin: 0;
      font-size: 1.55rem;
      line-height: 1.1;
    }

    .section {
      padding-top: 16px;
      margin-top: 16px;
      border-top: 1px solid var(--line);
    }

    .section h3 {
      margin: 0 0 7px;
      font-size: 0.86rem;
      color: var(--accent-dark);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .section p {
      margin: 0;
      color: var(--ink);
    }

    .source-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .source-list a {
      color: var(--accent-dark);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .note {
      margin-top: 12px;
      padding: 12px;
      border-left: 4px solid var(--gold);
      background: #fbf2df;
      color: #5c3b08;
      font-weight: 700;
    }

    .empty-state {
      display: none;
      padding: 28px;
      background: var(--paper);
      border: 1px solid var(--line);
      color: var(--muted);
      font-weight: 800;
    }

    @media (max-width: 980px) {
      .hero,
      .content,
      .control-row {
        grid-template-columns: 1fr;
      }

      .detail {
        position: static;
        max-height: none;
      }
    }

    @media (max-width: 560px) {
      .stats,
      .books {
        grid-template-columns: 1fr;
      }

      .hero {
        padding-top: 28px;
      }
    }
  </style>
</head>

  <header>

  <main class="shell">

    <section class="toolbar" aria-label="Book filters">

        <label>
          Search

        </label>
        <label>
          Romance

            <option value="">Any romance level</option>
            <option value="none">None or minimal</option>
            <option value="subplot">Subplot</option>
            <option value="central">Central</option>
            <option value="explicit">Explicit/open door</option>
          </select>
        </label>
        <label>
          Series
          <select id="seriesFilter">
            <option value="">Any series status</option>
            <option value="standalone">Standalone</option>
            <option value="ongoing">Ongoing series</option>
            <option value="complete">Complete series</option>
            <option value="uncertain">Needs confirmation</option>
          </select>
        </label>
        <label>
          Sort
          <select id="sortSelect">
            <option value="list">List order</option>
            <option value="title">Title</option>
            <option value="author">Author</option>
            <option value="series">Series status</option>
          </select>
        </label>
      </div>
      <div class="chips" id="chips" aria-label="Browse by category"></div>
    </section>

    <section class="content">
      <div>
        <div class="books" id="bookGrid"></div>
        <div class="empty-state" id="emptyState">No books match those filters.</div>
      </div>
      <aside class="detail" id="detailPanel" aria-live="polite">
        <div class="detail-empty">Select a book to see the full notes.</div>
      </aside>
    </section>
  </main>

    const chipData = [
      "romantasy",
      "epic fantasy",
      "political fantasy",
      "YA",
      "gothic",
      "found family",
      "enemies to lovers",
      "standalone",
      "complete",
      "ongoing",
      "needs confirmation"
    ];

    const state = {
      query: "",
      romance: "",
      series: "",
      sort: "list",
      chip: ""
    };

    const grid = document.querySelector("#bookGrid");
    const detailPanel = document.querySelector("#detailPanel");
    const emptyState = document.querySelector("#emptyState");
    const totalBooks = document.querySelector("#totalBooks");
    const visibleBooks = document.querySelector("#visibleBooks");
    const chips = document.querySelector("#chips");

    totalBooks.textContent = books.length;

    function coverFallback(book) {
      return `<div class="fallback-cover"><strong>${book.title}</strong><span>${book.author}</span></div>`;
    }

    function searchText(book) {
      return [
        book.title,
        book.author,
        book.plot,
        book.setting,
        book.magic,
        book.romance,
        book.series,
        book.seriesStatus,
        ...book.tropes
      ].join(" ").toLowerCase();
    }

    function matchesChip(book) {
      if (!state.chip) return true;
      if (state.chip === "YA") return searchText(book).includes(" ya ") || searchText(book).includes("young adult");
      if (["standalone", "complete", "ongoing"].includes(state.chip)) return book.seriesStatus === state.chip;
      if (state.chip === "needs confirmation") return book.seriesStatus === "uncertain" || searchText(book).includes("needs confirmation");
      return searchText(book).includes(state.chip.toLowerCase());
    }

    function filteredBooks() {
      const query = state.query.trim().toLowerCase();
      let list = books
        .map((book, index) => ({ ...book, index }))
        .filter((book) => !query || searchText(book).includes(query))
        .filter((book) => !state.romance || book.romanceLevel === state.romance)
        .filter((book) => !state.series || book.seriesStatus === state.series)
        .filter(matchesChip);

      if (state.sort === "title") list.sort((a, b) => a.title.localeCompare(b.title));
      if (state.sort === "author") list.sort((a, b) => a.author.localeCompare(b.author));
      if (state.sort === "series") list.sort((a, b) => a.seriesStatus.localeCompare(b.seriesStatus) || a.title.localeCompare(b.title));
      return list;
    }

    async function findCover(book, img) {
      const params = new URLSearchParams({ q: book.coverQuery || `${book.title} ${book.author}`, limit: "1" });
      try {
        const response = await fetch(`https://openlibrary.org/search.json?${params.toString()}`);
        if (!response.ok) throw new Error("Cover lookup failed");
        const data = await response.json();
        const coverId = data.docs && data.docs[0] && data.docs[0].cover_i;
        if (!coverId) throw new Error("No cover");
        img.src = `https://covers.openlibrary.org/b/id/${coverId}-L.jpg`;
        img.alt = `${book.title} cover`;
      } catch {
        const wrap = img.closest(".cover-wrap, .detail-cover");
        if (wrap) wrap.innerHTML = coverFallback(book);
      }
    }

    function renderCards() {
      const list = filteredBooks();
      visibleBooks.textContent = list.length;
      emptyState.style.display = list.length ? "none" : "block";
      grid.innerHTML = list.map((book) => `
        <button class="book-card" type="button" data-index="${book.index}">
          <div class="cover-wrap">
            <img data-cover="${book.index}" alt="" />
            <span class="badge">${book.seriesStatus === "uncertain" ? "Check details" : book.seriesStatus}</span>
          </div>
          <div class="book-body">
            <div>
              <h2>${book.title}</h2>
              <p class="author">${book.author}</p>
            </div>
            <div class="meta-row">
              ${book.tropes.slice(0, 4).map((trope) => `<span class="tag">${trope}</span>`).join("")}
            </div>
            <p class="quick">${book.plot}</p>
          </div>
        </button>
      `).join("");

      grid.querySelectorAll(".book-card").forEach((card) => {
        card.addEventListener("click", () => showDetail(Number(card.dataset.index)));
      });

      grid.querySelectorAll("img[data-cover]").forEach((img) => {
        findCover(books[Number(img.dataset.cover)], img);
      });

      if (list.length && !detailPanel.dataset.index) {
        showDetail(list[0].index);
      }
    }

    function showDetail(index) {
      const book = books[index];
      detailPanel.dataset.index = String(index);
      detailPanel.innerHTML = `
        <div class="detail-cover"><img data-detail-cover="${index}" alt="" /></div>
        <div class="detail-body">
          <h2>${book.title}</h2>
          <p class="author">${book.author}</p>
          <div class="meta-row" style="margin-top: 12px;">
            ${book.tropes.map((trope) => `<span class="tag">${trope}</span>`).join("")}
          </div>
          ${book.note ? `<div class="note">${book.note}</div>` : ""}
          ${section("Plot", book.plot)}
          ${section("Setting", book.setting)}
          ${section("Magic System", book.magic)}
          ${section("Romance", book.romance)}
          ${section("Series", book.series)}
          <div class="section">
            <h3>Sources</h3>
            <p>Use these links for deeper checking, especially for newer or indie titles.</p>
            <div class="source-list">
              ${book.sources.map((source) => `<a href="${source.url}" target="_blank" rel="noreferrer">${source.label}</a>`).join("")}
              <a href="https://openlibrary.org/search?q=${encodeURIComponent(book.coverQuery || book.title)}" target="_blank" rel="noreferrer">Cover lookup</a>
            </div>
          </div>
        </div>
      `;
      findCover(book, detailPanel.querySelector("img[data-detail-cover]"));
    }

    function section(title, text) {
      return `<div class="section"><h3>${title}</h3><p>${text}</p></div>`;
    }

    function renderChips() {
      chips.innerHTML = chipData.map((chip) => `
        <button class="chip" type="button" aria-pressed="${state.chip === chip}" data-chip="${chip}">${chip}</button>
      `).join("");
      chips.querySelectorAll(".chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          state.chip = state.chip === chip.dataset.chip ? "" : chip.dataset.chip;
          renderChips();
          renderCards();
        });
      });
    }

    document.querySelector("#searchInput").addEventListener("input", (event) => {
      state.query = event.target.value;
      renderCards();
    });

    document.querySelector("#romanceFilter").addEventListener("change", (event) => {
      state.romance = event.target.value;
      renderCards();
    });

    document.querySelector("#seriesFilter").addEventListener("change", (event) => {
      state.series = event.target.value;
      renderCards();
    });

    document.querySelector("#sortSelect").addEventListener("change", (event) => {
      state.sort = event.target.value;
      renderCards();
    });

    renderChips();
    renderCards();
  </script>
