<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sparkle Sums</title>
  <style>
    :root {
      --ink: #20223a;
      --bg: #fff8d8;
      --panel: #ffffff;
      --pink: #ff4d8d;
      --blue: #246bfe;
      --green: #11a36a;
      --yellow: #ffd23f;
      --orange: #ff8f2f;
      --line: #261f5d;
      --shadow: 0 16px 0 rgba(32, 34, 58, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 77, 141, 0.28) 0 70px, transparent 72px),
        radial-gradient(circle at 88% 12%, rgba(36, 107, 254, 0.22) 0 90px, transparent 92px),
        radial-gradient(circle at 80% 86%, rgba(17, 163, 106, 0.22) 0 110px, transparent 112px),
        linear-gradient(135deg, #fff8d8, #dcfbff);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(980px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .home {
      color: var(--line);
      font-weight: 900;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.72);
      border: 3px solid var(--line);
      padding: 10px 14px;
      border-radius: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 9vw, 5.7rem);
      line-height: 0.9;
      letter-spacing: 0;
      color: var(--line);
      text-shadow: 5px 5px 0 var(--yellow);
    }

    .scoreboard {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .scorebox {
      background: var(--panel);
      border: 3px solid var(--line);
      border-radius: 24px;
      padding: 14px;
      box-shadow: 0 8px 0 rgba(32, 34, 58, 0.12);
      text-align: center;
    }

    .scorebox span {
      display: block;
      color: #5d5f83;
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .scorebox strong {
      display: block;
      margin-top: 4px;
      font-size: 2rem;
    }

    .stage {
      position: relative;
      overflow: hidden;
      background: var(--panel);
      border: 4px solid var(--line);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 5vw, 36px);
    }

    .problem {
      display: grid;
      grid-template-columns: 1fr auto 1fr auto 1fr;
      align-items: center;
      gap: clamp(8px, 2vw, 18px);
      margin: 12px 0 24px;
      text-align: center;
    }

    .number,
    .symbol {
      min-height: clamp(78px, 18vw, 128px);
      display: grid;
      place-items: center;
      border-radius: 26px;
      font-size: clamp(2.5rem, 10vw, 5.4rem);
      font-weight: 900;
    }

    .number {
      color: #fff;
      border: 4px solid var(--line);
      box-shadow: 0 10px 0 rgba(32, 34, 58, 0.16);
    }

    .number:first-child {
      background: var(--pink);
    }

    .number:nth-child(3) {
      background: var(--blue);
    }

    .answer-box {
      width: 100%;
      min-width: 0;
      min-height: clamp(78px, 18vw, 128px);
      border: 4px dashed var(--orange);
      border-radius: 26px;
      color: var(--line);
      background: #fff7c4;
      text-align: center;
      font-size: clamp(2.5rem, 10vw, 5rem);
      font-weight: 900;
      outline: none;
    }

    .answer-box:focus {
      border-style: solid;
      box-shadow: 0 0 0 5px rgba(255, 143, 47, 0.24);
    }

    .symbol {
      color: var(--line);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .action {
      min-height: 64px;
      border: 3px solid var(--line);
      border-radius: 22px;
      color: #fff;
      cursor: pointer;
      font-size: clamp(1.1rem, 4vw, 1.45rem);
      font-weight: 900;
      box-shadow: 0 8px 0 rgba(32, 34, 58, 0.18);
    }

    .action:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 rgba(32, 34, 58, 0.18);
    }

    .check {
      background: var(--green);
    }

    .next {
      background: var(--orange);
    }

    .message {
      min-height: 76px;
      display: grid;
      place-items: center;
      margin: 22px 0 0;
      padding: 14px;
      border-radius: 24px;
      background: #eefbff;
      border: 3px solid #85d9f5;
      color: var(--line);
      font-size: clamp(1.25rem, 5vw, 2rem);
      font-weight: 900;
      text-align: center;
    }

    .stars {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      min-height: 40px;
      margin-top: 18px;
      font-size: 1.8rem;
    }

    .pop {
      animation: pop 420ms ease;
    }

    @keyframes pop {
      0% {
        transform: scale(0.86) rotate(-2deg);
      }
      60% {
        transform: scale(1.08) rotate(2deg);
      }
      100% {
        transform: scale(1) rotate(0);
      }
    }

    @media (max-width: 700px) {
      header {
        align-items: flex-start;
        flex-direction: column-reverse;
      }

      .scoreboard,
      .controls {
        grid-template-columns: 1fr;
      }

      .problem {
        grid-template-columns: 1fr;
      }

      .symbol {
        min-height: auto;
        font-size: 2.4rem;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>Sparkle Sums</h1>
      <a class="home" href="../index.html">Library</a>
    </header>

    <section class="scoreboard" aria-label="Score">
      <div class="scorebox">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="scorebox">
        <span>Streak</span>
        <strong id="streak">0</strong>
      </div>
      <div class="scorebox">
        <span>Level</span>
        <strong id="level">1</strong>
      </div>
    </section>

    <section class="stage" aria-labelledby="problem-title">
      <h2 id="problem-title" hidden>Add the numbers</h2>
      <div class="problem">
        <div class="number" id="leftNumber">2</div>
        <div class="symbol">+</div>
        <div class="number" id="rightNumber">3</div>
        <div class="symbol">=</div>
        <input class="answer-box" id="answer" inputmode="numeric" aria-label="Your answer" autocomplete="off" />
      </div>

      <div class="controls">
        <button class="action check" id="checkButton" type="button">Check It!</button>
        <button class="action next" id="nextButton" type="button">New Sum</button>
      </div>

      <div class="message" id="message" aria-live="polite">Type the answer, then check it!</div>
      <div class="stars" id="stars" aria-label="Stars earned"></div>
    </section>
  </main>

  <script>
    const leftNumber = document.querySelector("#leftNumber");
    const rightNumber = document.querySelector("#rightNumber");
    const answer = document.querySelector("#answer");
    const scoreEl = document.querySelector("#score");
    const streakEl = document.querySelector("#streak");
    const levelEl = document.querySelector("#level");
    const message = document.querySelector("#message");
    const stars = document.querySelector("#stars");
    const checkButton = document.querySelector("#checkButton");
    const nextButton = document.querySelector("#nextButton");

    let currentLeft = 0;
    let currentRight = 0;
    let score = 0;
    let streak = 0;

    function randomNumber(max) {
      return Math.floor(Math.random() * max) + 1;
    }

    function levelFromScore() {
      return Math.min(5, Math.floor(score / 5) + 1);
    }

    function newProblem() {
      const max = 5 + levelFromScore() * 2;
      currentLeft = randomNumber(max);
      currentRight = randomNumber(max);
      leftNumber.textContent = currentLeft;
      rightNumber.textContent = currentRight;
      answer.value = "";
      message.textContent = "Type the answer, then check it!";
      message.style.background = "#eefbff";
      message.style.borderColor = "#85d9f5";
      document.querySelector(".stage").classList.remove("pop");
      answer.focus();
    }

    function updateScore() {
      scoreEl.textContent = score;
      streakEl.textContent = streak;
      levelEl.textContent = levelFromScore();
      stars.textContent = "★".repeat(Math.min(score, 12));
    }

    function checkAnswer() {
      const guess = Number(answer.value);
      const correct = currentLeft + currentRight;

      if (!answer.value.trim()) {
        message.textContent = "Give it a try!";
        return;
      }

      if (guess === correct) {
        score += 1;
        streak += 1;
        message.textContent = streak >= 3 ? "Super streak! You are on fire!" : "Correct! Sparkly math!";
        message.style.background = "#e9fff5";
        message.style.borderColor = "#66d6a5";
        document.querySelector(".stage").classList.add("pop");
        updateScore();
        window.setTimeout(newProblem, 900);
      } else {
        streak = 0;
        message.textContent = `Almost! ${currentLeft} + ${currentRight} = ${correct}. Try a new one!`;
        message.style.background = "#fff0f4";
        message.style.borderColor = "#ff9abf";
        updateScore();
      }
    }

    checkButton.addEventListener("click", checkAnswer);
    nextButton.addEventListener("click", newProblem);
    answer.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        checkAnswer();
      }
    });

    updateScore();
    newProblem();
  </script>
</body>
</html>
