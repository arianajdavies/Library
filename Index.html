<html lang="en">

    :root {

      --primary: #2563eb;
      --primary-dark: #1d4ed8;

      --max-width: 1180px;

    html {

      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    img {

      display: block;
    }

    a {

      text-decoration: none;
    }

    .container {

      font-size: 0.9rem;
      font-weight: 700;
    }

    .section-header {

      text-align: center;
    }

      letter-spacing: -0.04em;

    .section-header p {

      font-weight: 800;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
    }
